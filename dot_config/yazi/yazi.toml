# ~/.config/yazi/yazi.toml
[mgr]
# linemode = "size_and_mtime"
linemode = "size"

[opener]
play = [
	{ run = "mpv %s", orphan = true }
]
play_exe = [
	{ run = 'wine "$@"', orphan = true, desc = "Wine", for = "unix" }
]

[open]
prepend_rules = [
	{ url = "*.exe", use = "play_exe" }
]

[preview]
max_width  = 2048
max_height = 2048
image_delay = 0
image_filter = "lanczos3"
image_quality = 90
